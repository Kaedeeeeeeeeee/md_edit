name: Notation
options:
  bundleIdPrefix: com.notation
  deploymentTarget:
    macOS: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "Y4FV6WUU4V"

targets:
  Notation:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/Notation
      - path: Resources/editor
        type: folder
        buildPhase: resources
      - path: Assets.xcassets
    info:
      path: Sources/Notation/Info.plist
      properties:
        CFBundleDisplayName: "Notation"
        CFBundleName: "Notation"
        CFBundleShortVersionString: "0.1"
        CFBundleVersion: "1"
        CFBundleIdentifier: com.notation.app
        LSApplicationCategoryType: public.app-category.productivity
        LSMinimumSystemVersion: "26.0"
        NSPrincipalClass: NSApplication
        NSHumanReadableCopyright: ""
        # Declare we can open Markdown / plain-text files so Finder lists
        # us under "Open With" and double-clicking a .md routes the URL to
        # this app.
        CFBundleDocumentTypes:
          - CFBundleTypeName: "Markdown Document"
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - net.daringfireball.markdown
              - public.plain-text
        # Import the de-facto markdown UTI so the system knows .md / .markdown
        # files map to net.daringfireball.markdown (and that it conforms to
        # plain text).
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: net.daringfireball.markdown
            UTTypeDescription: "Markdown Document"
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - md
                - markdown
                - mdown
                - mkd
              public.mime-type:
                - text/markdown
    settings:
      base:
        PRODUCT_NAME: "Notation"
        PRODUCT_BUNDLE_IDENTIFIER: com.notation.app
        ENABLE_PREVIEWS: YES
        CODE_SIGN_ENTITLEMENTS: Sources/Notation/Notation.entitlements
        ENABLE_APP_SANDBOX: YES
