name: Notation
options:
  bundleIdPrefix: com.notation
  deploymentTarget:
    macOS: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "Y4FV6WUU4V"

targets:
  Notation:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/Notation
        excludes:
          - "en.lproj"
          - "zh-Hans.lproj"
      - path: Sources/Notation/en.lproj
        type: folder
        buildPhase: resources
      - path: Sources/Notation/zh-Hans.lproj
        type: folder
        buildPhase: resources
      - path: Resources/editor
        type: folder
        buildPhase: resources
      - path: Assets.xcassets
    info:
      path: Sources/Notation/Info.plist
      properties:
        CFBundleDisplayName: "Notation"
        CFBundleName: "Notation"
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CFBundleIdentifier: com.shifengzhang.notation
        CFBundleLocalizations:
          - en
          - zh-Hans
        LSApplicationCategoryType: public.app-category.productivity
        LSMinimumSystemVersion: "26.0"
        NSPrincipalClass: NSApplication
        NSHumanReadableCopyright: "© 2026 Shifeng Zhang"
        # Standard HTTPS via URLSession is exempt from export compliance under
        # 15 CFR 740.17(b)(2). Declaring this here lets every App Store Connect
        # upload skip the per-build "Are you using non-exempt encryption?" prompt.
        ITSAppUsesNonExemptEncryption: false
        # Declare we can open Markdown / plain-text files so Finder lists
        # us under "Open With" and double-clicking a .md routes the URL to
        # this app.
        CFBundleDocumentTypes:
          - CFBundleTypeName: "Markdown Document"
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - net.daringfireball.markdown
              - public.plain-text
        # Import the de-facto markdown UTI so the system knows .md / .markdown
        # files map to net.daringfireball.markdown (and that it conforms to
        # plain text).
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: net.daringfireball.markdown
            UTTypeDescription: "Markdown Document"
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - md
                - markdown
                - mdown
                - mkd
              public.mime-type:
                - text/markdown
    settings:
      base:
        PRODUCT_NAME: "Notation"
        PRODUCT_BUNDLE_IDENTIFIER: com.shifengzhang.notation
        ENABLE_PREVIEWS: YES
        CODE_SIGN_ENTITLEMENTS: Sources/Notation/Notation.entitlements
        ENABLE_APP_SANDBOX: YES

schemes:
  Notation:
    build:
      targets:
        Notation: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
